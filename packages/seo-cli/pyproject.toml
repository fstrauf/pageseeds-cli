[build-system]
requires = ["pdm-backend~=2.4.0"]
build-backend = "pdm.backend"

[project]
name = "seo-mcp"
version = "0.2.4"
description = "A free SEO tool MCP (Model Control Protocol) service based on Ahrefs data. Includes features such as backlinks, keyword ideas, and more."
readme = "README.md"
authors = [
    {name = "cnych", email = "ych_1024@163.com"}
]
license = {text = "MIT"}
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
requires-python = ">=3.10"
dependencies = [
    "fastmcp~=2.13.0",
    "requests~=2.32.0",
    "pydantic~=2.10.0",
    "pydantic-core~=2.27.0"
]

[project.scripts]
seo-mcp = "seo_mcp.server:main"
seo-cli = "seo_mcp.cli:main"

[project.urls]
"Homepage" = "https://github.com/cnych/seo-mcp"
"Bug Tracker" = "https://github.com/cnych/seo-mcp/issues"

[tool.setuptools]
packages = ["seo_mcp"]
package-dir = {"" = "src"}

[tool.pytest.ini_options]
pythonpath = ["src"]
markers = [
    "integration: marks tests that call external services and require a valid CAPSolver key"
]
